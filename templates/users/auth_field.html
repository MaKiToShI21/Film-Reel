<div class="auth-field{% if field.errors %} auth-field--error{% endif %}">
    <label class="auth-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.errors %}
    <ul class="auth-errors">
        {% for error in field.errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
    {% endif %}
</div>
