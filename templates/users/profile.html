{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="content-text auth-form">
    <h1>Профиль</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% if user.photo %}
        <p><img src="{{ user.photo.url }}" alt="Фото профиля" class="profile-photo"></p>
        {% else %}
        <p><img src="{{ default_image }}" alt="Фото по умолчанию" class="profile-photo"></p>
        {% endif %}
        <div class="form-error">{{ form.non_field_errors }}</div>
        {% for f in form %}
        <p>
            <label class="form-label" for="{{ f.id_for_label }}">{{ f.label }}:</label>
            {{ f }}
        </p>
        <div class="form-error">{{ f.errors }}</div>
        {% endfor %}
        <p><button type="submit">Сохранить</button></p>
    </form>
    <hr>
    <p><a href="{% url 'users:password_change' %}">Сменить пароль</a></p>
</div>
{% endblock %}
