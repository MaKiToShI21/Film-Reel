{% load static %}
<header>
    <div class="header header-shell">
        <a class="header-brand" href="{% url 'films:home' %}">FilmReel</a>
        <nav>
            <ul class="mainmenu">
                <li><a href="{% url 'films:home' %}">Главная</a></li>
                <li><a href="{% url 'films:about' %}">О каталоге</a></li>
            </ul>
        </nav>
        <form class="header-search" method="get" action="{% url 'films:home' %}">
            <input
                type="search"
                name="q"
                value="{{ search_query|default:'' }}"
                placeholder="Поиск по названию, описанию, жанру"
                aria-label="Поиск фильмов"
            >
            <button type="submit">Найти</button>
        </form>
        <div class="header-auth">
            {% if user.is_authenticated %}
            <a href="{% url 'users:profile' %}">{{ user.username }}</a>
            |
            <form class="logout-form" method="post" action="{% url 'users:logout' %}">
                {% csrf_token %}
                <button type="submit" class="logout-link">Выйти</button>
            </form>
            {% else %}
            <a href="{% url 'users:login' %}">Войти</a>
            |
            <a href="{% url 'users:register' %}">Регистрация</a>
            {% endif %}
        </div>
    </div>
</header>
