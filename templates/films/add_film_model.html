{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="form-page">
    <div class="form-card">
        <h1>{{ title }}</h1>
        <form action="" method="post" enctype="multipart/form-data" class="site-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Добавить запись</button>
        </form>
    </div>
</section>
{% endblock %}
