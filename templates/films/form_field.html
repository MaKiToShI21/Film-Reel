<div class="film-form-field{% if field.errors %} film-form-field--error{% endif %}">
    <label class="film-form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}
    <p class="film-form-help">{{ field.help_text }}</p>
    {% endif %}
    {% if field.errors %}
    <ul class="film-form-errors">
        {% for error in field.errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
    {% endif %}
</div>
